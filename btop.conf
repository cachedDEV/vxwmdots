# btop config file

# Aesthetic & Theme
color_theme = "monochrome"
theme_background = False       # MUST be False for transparency to work
truecolor = True               # Required for hex color support
rounded_corners = True         # Matches modern terminal looks
graph_symbol = "braille"       # Smoothest looking graphs

# Interface Settings
vim_keys = True                # Navigation with h, j, k, l
presets = "cpu:0:default,mem:0:default,net:0:default,proc:0:default"
shown_boxes = "cpu mem net proc"
update_ms = 1500               # Balance between smoothness and CPU usage

# CPU & Memory
cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_invert_lower = True
cpu_single_graph = False
mem_graphs = True
mem_below_net = False

# Processes
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False              # Set to True if you prefer a tree view
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True

# GPU (Auto-detected if available)
proc_info_scrollbar = True

# Net
net_download = 100
net_upload = 100
net_auto = True
net_sync = True
