# --- Colors: Deep charcoal and snowy white ---
background #1a1a1a
foreground #e0e0e0

# --- Cursor & Trail ---
cursor       #ffffff
cursor_trail 3
cursor_trail_decay 0.1 0.4

# --- Full Grayscale ANSI Palette ---
# Black/Dark Gray
color0 #1a1a1a
color8 #404040

# Red -> Gray
color1 #555555
color9 #666666

# Green -> Gray
color2 #777777
color10 #888888

# Yellow -> Gray
color3 #999999
color11 #aaaaaa

# Blue -> Gray
color4 #444444
color12 #5a5a5a

# Magenta -> Gray
color5 #bbbbbb
color13 #cccccc

# Cyan -> Gray
color6 #909090
color14 #b0b0b0

# White/Light Gray
color7 #c0c0c0
color15 #ffffff

# --- Window Layout ---
window_padding_width 15
hide_window_decorations yes
confirm_os_window_close 0

# --- Fonts ---
# BEGIN_KITTY_FONTS
font_family      family="CaskaydiaCove Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

